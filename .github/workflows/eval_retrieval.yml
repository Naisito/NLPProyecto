name: Evaluación del Retriever

on:
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: models_cache
          key: hf-models-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            hf-models-${{ runner.os }}-

      - name: Cache ChromaDB index
        uses: actions/cache@v4
        with:
          path: db/chroma_db
          key: chromadb-${{ runner.os }}-${{ hashFiles('data/pois_bilbao_bizkaia.json') }}
          restore-keys: |
            chromadb-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run retrieval evaluation (compare mode)
        env:
          HF_HUB_CACHE: models_cache
          TRANSFORMERS_CACHE: models_cache
        run: python -m evaluation.eval_retrieval --gold evaluation/gold_set.json --mode compare --output results/compare.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrieval-results
          path: results/compare.json
